name: CI

# Run on every push to the three persistent branches, and on every PR
# that targets main or staging — so broken code is caught before merge.
on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node 20 (LTS) with npm cache for fast installs
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Clean install — respects package-lock.json exactly
      - name: Install dependencies
        run: npm ci

      # 4. Lint — max-warnings 0 means any warning fails the job
      - name: Lint
        run: npm run lint

      # 5. Production build — catches import errors, type issues, etc.
      - name: Build
        run: npm run build
